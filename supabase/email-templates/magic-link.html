<!doctype html>
<html lang="en">
  <body style="margin:0;background:#080d18;color:#e9eefc;font-family:Arial,sans-serif;padding:32px">
    <div style="max-width:520px;margin:auto;background:#111a2d;border:1px solid #27334c;border-radius:14px;padding:28px;text-align:center">
      <p style="font-size:11px;letter-spacing:2px;color:#45e5d0">MERGE STACK CLOUD</p>
      <h1 style="font-size:24px">Your sign-in code</h1>
      <p style="color:#9aa6bb">Enter this code in the Merge Stack app:</p>
      <div style="margin:24px 0;font-family:monospace;font-size:34px;font-weight:bold;letter-spacing:8px;color:#45e5d0">{{ .Token }}</div>
      <p style="font-size:13px;color:#7f8ba2">The code expires shortly and can only be used once.</p>
      <hr style="border:0;border-top:1px solid #27334c;margin:26px 0">
      <p style="font-size:12px;color:#7f8ba2">Not using the installed app?</p>
      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:11px 18px;border-radius:7px;background:#22685d;color:white;text-decoration:none">Sign in using your browser</a>
    </div>
  </body>
</html>
